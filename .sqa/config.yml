config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/Ophidia
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/grycap/im-oaipmh-client:
      branch: main
      repo: https://github.com/grycap/im-oaipmh-client
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/grycap/im-oaipmh-client git:
        commands:
        - /usr/bin/env sh .sqa/script.woozy-cyan-avocet.sh
        container: qc.acc_stinky-silver-dachshund
  QC.Doc:
    repos:
      github.com/grycap/im-oaipmh-client find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.randy-aquamarine-affenpinscher.sh
        container: qc.doc_flimsy-purple-hamster
      github.com/grycap/im-oaipmh-client git:
        commands:
        - /usr/bin/env sh .sqa/script.freaky-celadon-ray.sh
        container: qc.doc_bluesy-cyan-hare
      github.com/grycap/im-oaipmh-client markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.frumpy-azure-kudu.sh
        container: qc.doc_lanky-ultramarine-yak
  QC.Lic:
    repos:
      github.com/grycap/im-oaipmh-client licensee:
        commands:
        - /usr/bin/env sh .sqa/script.shaky-amethyst-indri.sh
        container: qc.lic_gloppy-goldenrod-newt
  QC.Met:
    repos:
      github.com/grycap/im-oaipmh-client validate_codemeta:
        commands:
        - /usr/bin/env sh .sqa/script.flabby-puce-tuatara.sh
        container: qc.met_stealthy-ivory-antelope
  QC.Sec:
    repos:
      github.com/grycap/im-oaipmh-client bandit:
        commands:
        - /usr/bin/env sh .sqa/script.randy-ultramarine-pig.sh
        container: qc.sec_squeaky-white-bordeaux
  QC.Sty:
    repos:
      github.com/grycap/im-oaipmh-client flake8:
        commands:
        - /usr/bin/env sh .sqa/script.muzzy-viridian-wasp.sh
        container: qc.sty_randy-copper-tarantula
      github.com/grycap/im-oaipmh-client jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.beady-pumpkin-horse.sh
        container: qc.sty_wimpy-thistle-bear
  QC.Uni:
    repos:
      github.com/grycap/im-oaipmh-client pytest:
        commands:
        - /usr/bin/env sh .sqa/script.nippy-linen-mongoose.sh
        container: qc.uni_hazy-lemon-hippopotamus
  QC.Ver:
    repos:
      github.com/grycap/im-oaipmh-client get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.squirrely-chartreuse-coral.sh
        container: qc.ver_homey-puce-balinese
timeout: 5400
